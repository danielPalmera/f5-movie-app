<div class="min-h-screen bg-gray-950 text-white flex items-center justify-center">
    @if (movies().length === 0) {
        
            <p class="text-3xl font-bold text-center">No hay películas disponibles.</p>
        
    }
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 p-4">
        @for (movie of movies(); track movie.id) {
            <app-movie-list-item [movie]="movie" />
        }
    </div>
</div>
